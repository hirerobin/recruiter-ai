services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: recruiter
      POSTGRES_PASSWORD: recruiter_pass
      POSTGRES_DB: recruiter_ai
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/pg_hba.conf:/var/lib/postgresql/pg_hba.conf:ro
    command: ["postgres", "-c", "hba_file=/var/lib/postgresql/pg_hba.conf", "-c", "password_encryption=md5"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recruiter -d recruiter_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
